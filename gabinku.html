<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinku - Renyah Diluar Lumer Didalam</title>
    <style>
        body { font-family: 'Poppins', 'Segoe UI', sans-serif; background-color: #fff9e6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Gaya Header Brand (Pojok Kiri Atas) */
        .brand-header { width: 100%; max-width: 400px; padding: 10px 15px; display: flex; align-items: center; position: fixed; top: 0; background-color: rgba(255, 255, 255, 0.9); z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo-header { height: 40px; border-radius: 5px; }

        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 16px rgba(211, 84, 0, 0.1); width: 100%; max-width: 400px; border: 1px solid #f39c12; margin-top: 70px; margin-bottom: 30px; }
        h2 { text-align: center; color: #d35400; margin-bottom: 5px; }
        .tagline { text-align: center; font-size: 13px; color: #7f8c8d; font-style: italic; margin-top: 0; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Gaya Input Jumlah per Rasa */
        .rasa-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; background: #fffcf5; padding: 10px; border-radius: 10px; border: 1px solid #fff3e0; }
        .rasa-name { font-weight: 600; flex: 1; }
        .rasa-qty { width: 70px !important; text-align: center; font-size: 16px; border-color: #f39c12 !important; }

        .btn-lokasi { background-color: #ebf5fb; color: #2980b9; border: 1pxdashed #2980b9; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 12px; margin-bottom: 10px; width: 100%; font-weight: bold; }
        .btn-pesan { width: 100%; padding: 15px; background: linear-gradient(135deg, #f1c40f, #d35400); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 8px rgba(211, 84, 0, 0.2); }
        .footer { text-align: center; font-size: 11px; color: #bdc3c7; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="brand-header">
        <img src="Gabin.png" alt="Logo Gabinku" class="logo-header">
    </div>

    <div class="container">
        <h2>Order Gab!nku 🍞</h2>
        <p class="tagline">"Gurihnya Bikin Nagih!"</p>
        
        <div class="form-group">
            <label>Nama Anda:</label>
            <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
        </div>

        <label style="margin-top: 15px;">Menu & Jumlah:</label>
        
        <div class="rasa-row">
            <span class="rasa-name">🍦 Fla Susu</span>
            <input type="number" id="qty_susu" class="rasa-qty" value="0" min="0">
        </div>

        <div class="rasa-row">
            <span class="rasa-name">🍠 Ubi Ungu</span>
            <input type="number" id="qty_ubi" class="rasa-qty" value="0" min="0">
        </div>

        <div class="rasa-row">
            <span class="rasa-name">🍵 Matcha</span>
            <input type="number" id="qty_matcha" class="rasa-qty" value="0" min="0">
        </div>
        
        <div class="form-group" style="margin-top: 20px;">
            <label>Alamat/Patokan:</label>
            <button class="btn-lokasi" onclick="ambilLokasi()">📍 Gunakan Titik GPS</button>
            <textarea id="alamat" rows="3" placeholder="Contoh: Jl. Merdeka No. 1, samping masjid..." required></textarea>
        </div>
        
        <button class="btn-pesan" onclick="kirimKeWA()">Kirim Order (WhatsApp)</button>
        
        <div class="footer">
            © 2026 Gabinku Rafif
        </div>
    </div>

    <script>
        function ambilLokasi() {
            const alamatBox = document.getElementById("alamat");
            alamatBox.value = "Sedang mengambil lokasi...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    alamatBox.value = `Titik Lokasi: https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                }, function() {
                    alert("GPS gagal. Mohon isi alamat manual.");
                    alamatBox.value = "";
                });
            }
        }

        function kirimKeWA() {
            const nomorWA = "6287786209071"; 
            const nama = document.getElementById("nama").value;
            const susu = document.getElementById("qty_susu").value;
            const ubi = document.getElementById("qty_ubi").value;
            const matcha = document.getElementById("qty_matcha").value;
            const alamat = document.getElementById("alamat").value;
            const total = parseInt(susu) + parseInt(ubi) + parseInt(matcha);

            if (nama === "" || alamat === "" || total === 0) {
                alert("Mohon lengkapi Nama, Alamat, dan pilih minimal 1 pesanan!");
                return;
            }

            let daftarOrder = "";
            if (susu > 0) daftarOrder += `- Fla Susu: ${susu} pcs%0A`;
            if (ubi > 0) daftarOrder += `- Ubi Ungu: ${ubi} pcs%0A`;
            if (matcha > 0) daftarOrder += `- Matcha: ${matcha} pcs%0A`;

            const pesan = `*ORDER GABiNKU BARU!*%0A` +
                          `---------------------------%0A` +
                          `*Nama:* ${nama}%0A` +
                          `*Pesanan:*%0A${daftarOrder}` +
                          `---------------------------%0A` +
                          `*Alamat:* ${alamat}%0A%0A` +
                          `Mohon diproses ya kak!`;

            window.open(`https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesan}`, "_blank");
        }
    </script>
</body>
</html>

    <script>
        function ambilLokasi() {
            const alamatBox = document.getElementById("alamat");
            alamatBox.value = "Sedang mengambil lokasi...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    alamatBox.value = `Lokasi: https://www.google.com/maps?q=${lat},${lon}`;

                    alamatBox.value = "";
                });
            }
        }

        function kirimKeWA() {
            const nomorWA = "6287786209071"; 
            const nama = document.getElementById("nama").value;
            const susu = document.getElementById("qty_susu").value;
            const ubi = document.getElementById("qty_ubi").value;
            const matcha = document.getElementById("qty_matcha").value;
            const alamat = document.getElementById("alamat").value;

            // Validasi: Harus pesan minimal 1
            const total = parseInt(susu) + parseInt(ubi) + parseInt(matcha);

            if (nama === "" || alamat === "") {
                alert("Mohon isi Nama dan Alamat!");
                return;
            }
            if (total === 0) {
                alert("Mohon isi jumlah pesanan minimal 1!");
                return;
            }

            let daftarPesanan = "";
            if (susu > 0) daftarPesanan += `- Fla Susu: ${susu}%0A`;
            if (ubi > 0) daftarPesanan += `- Ubi Ungu: ${ubi}%0A`;
            if (matcha > 0) daftarPesanan += `- Matcha: ${matcha}%0A`;

            const pesan = `*PESANAN BARU - ROTI GAB!N*%0A` +
                          `---------------------------%0A` +
                          `*Nama:* ${nama}%0A` +
                          `*Rincian Pesanan:*%0A${daftarPesanan}` +
                          `*Total Gabin:* ${total} pcs%0A` +
                          `---------------------------%0A` +
                          `*Alamat:* ${alamat}%0A` +
                          `---------------------------`;

            const urlWA = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesan}`;
            window.open(urlWA, "_blank");
        }
    </script>

</body>
</html>
